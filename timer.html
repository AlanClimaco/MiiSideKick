<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer do Assistente</title>
    <link rel="stylesheet" href="/src/css/global.css" />
    <link rel="stylesheet" href="/src/css/timer.css" />
</head>
<body class="timer-body">
    
    <div class="glass-card timer-card">
        
        <div class="timer-header">
            <img src="/src/assets/reacoes/mii-normal.png" alt="Mii" class="timer-avatar">
            <h3 class="timer-title">Novo Lembrete</h3>
        </div>
        
        <div class="input-group">
            <label>Tempo (em minutos):</label>
            <input type="number" id="minutos" min="1" value="1">
        </div>

        <div class="input-group">
            <label>Avisar sobre o quê?</label>
            <input type="text" id="mensagem" placeholder="Comer cuscuz...">
        </div>

        <button class="btn-primary" id="btnIniciar">Iniciar</button>
        <button class="btn-secondary timer-cancel-btn" id="btnFechar">Cancelar</button>
    </div>

    <script type="module" src="/src/timer/timer.ts"></script>
</body>
</html>
